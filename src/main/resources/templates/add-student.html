<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        input:focus, select:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 1px #06b6d4;
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-20">

<header class="w-full bg-slate-900 border-b border-slate-800 pt-8 pb-6 px-6 text-center shadow-lg">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 mb-2">
            Add New Student
        </h1>
        <p class="text-slate-400">Enter student information below</p>
    </div>
</header>

<main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 mt-12">

    <div class="glass-card rounded-2xl p-8">
        <form th:action="@{/save-student}" th:object="${student}" method="post" class="space-y-6">

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Student ID</label>
                <input type="number" th:field="*{id}" required
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:border-cyan-400 focus:outline-none transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Full Name</label>
                <input type="text" th:field="*{name}" required
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:border-cyan-400 focus:outline-none transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Department</label>
                <input type="text" th:field="*{department}" required
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:border-cyan-400 focus:outline-none transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                <input type="email" th:field="*{email}" required
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:border-cyan-400 focus:outline-none transition-colors">
            </div>

            <div class="flex flex-col sm:flex-row gap-4 pt-4">
                <button type="submit" class="flex-1 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all transform hover:scale-105 shadow-lg">
                    💾 Save Student
                </button>
                <a href="/students" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-6 rounded-xl transition-all text-center shadow-lg">
                    📋 View Students
                </a>
            </div>

        </form>
    </div>

    <div class="text-center mt-8">
        <a href="/" class="text-slate-400 hover:text-cyan-400 transition-colors">
            ← Back to Home
        </a>
    </div>

</main>

</body>
</html>
