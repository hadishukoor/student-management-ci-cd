<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .table-header {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .table-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background-color 0.2s;
        }
        .table-row:hover {
            background: rgba(30, 41, 59, 0.3);
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-20">

<header class="w-full bg-slate-900 border-b border-slate-800 pt-8 pb-6 px-6 text-center shadow-lg">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 mb-2">
            Students Directory
        </h1>
        <p class="text-slate-400">Complete list of registered students</p>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-12">

    <div class="glass-card rounded-2xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-white">All Students</h2>
            <span class="bg-slate-800 text-slate-300 px-3 py-1 rounded-full text-sm">
                <span th:text="${#lists.size(students)}"></span> Students
            </span>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="table-header">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase tracking-wider">Name</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase tracking-wider">Department</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-300 uppercase tracking-wider">Email</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700">
                    <tr th:each="student : ${students}" class="table-row">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-cyan-400">
                            <span th:text="${student.id}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-white font-medium">
                            <span th:text="${student.name}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-300">
                            <span class="px-2 py-1 bg-slate-800 rounded-full text-xs" th:text="${student.department}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-300">
                            <span th:text="${student.email}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="4" class="px-6 py-12 text-center text-slate-500">
                            <div class="text-4xl mb-4">📝</div>
                            <p class="text-lg">No students registered yet</p>
                            <p class="text-sm mt-2">Add your first student to get started!</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 mt-8 pt-6 border-t border-slate-700">
            <a href="/add-student" class="flex-1 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all transform hover:scale-105 shadow-lg text-center">
                ➕ Add New Student
            </a>
            <a href="/" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-6 rounded-xl transition-all text-center shadow-lg">
                🏠 Back to Home
            </a>
        </div>
    </div>

</main>

</body>
</html>
